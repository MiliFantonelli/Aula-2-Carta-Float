<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta com Float</title>
</head>
<body>

  <div style="width: 400px; height: 600px; border: 2px solid #c9a26b; padding: 15px; box-sizing: border-box; background-color: white; font-family: Arial, sans-serif;">

    <div style="width: 220px; background-color: #e8deea; float: right; text-align: center; padding: 8px; box-sizing: border-box; margin-bottom: 20px;">
      Florianópolis, 2 de abril de 2026.
    </div>

    <div style="clear: both;"></div>

    <div style="width: 180px; background-color: #e8deea; float: left; padding: 8px; box-sizing: border-box; margin-bottom: 20px;">
      Olá, professor.
    </div>

    <div style="clear: both;"></div>

    <div style="width: 100%; background-color: #e8deea; text-align: center; padding: 20px; box-sizing: border-box; margin-bottom: 20px; line-height: 1.6;">
      Como você está? Eu estou gostando bastante de fazer a disciplina de responsive web development. Espero aprender ainda mais coisas. Até as próximas aulas.
    </div>

    <div style="width: 180px; background-color: #e8deea; padding: 8px; box-sizing: border-box; margin-bottom: 15px;">
      Abraços!
    </div>

    <div style="width: 180px; background-color: #e8deea; padding: 8px; box-sizing: border-box;">
      Miliane F.
    </div>

  </div>

</body>
</html>
